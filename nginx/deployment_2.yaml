apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-kubernetes
  namespace: default
  labels:
    app: hello-kubernetes
    variant: application-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-kubernetes
      variant: application-a
  template:
    metadata:
      labels:
        app: hello-kubernetes
        variant: application-a
    spec:
      containers:
      - name: hello-kubernetes
        image: paulbouwer/hello-kubernetes:1.10
        env:
        - name: MESSAGE
          value: "application A"
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-kubernetes-b
  namespace: default
  labels:
    app: hello-kubernetes
    variant: application-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-kubernetes
      variant: application-b
  template:
    metadata:
      labels:
        app: hello-kubernetes
        variant: application-b
    spec:
      containers:
      - name: hello-kubernetes
        image: paulbouwer/hello-kubernetes:1.10
        env:
        - name: MESSAGE
          value: "application B"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-kubernetes
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: hello-kubernetes
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello-kubernetes
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`hello-kubernetes.192.168.123.125.nip.io`)
      kind: Rule
      services:
        - name: hello-kubernetes
          port: 80
