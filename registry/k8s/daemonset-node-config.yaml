apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-node-config
  namespace: registry
spec:
  selector:
    matchLabels:
      app: registry-node-config
  template:
    metadata:
      labels:
        app: registry-node-config
    spec:
      hostPID: true
      tolerations:
      - operator: Exists
      initContainers:
      - name: configure-containerd
        image: busybox:1.36
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - |
          REGISTRY="192.168.123.248:5000"
          CERT_DIR="/host-certs/${REGISTRY}"
          HOSTS_TOML="${CERT_DIR}/hosts.toml"

          mkdir -p "${CERT_DIR}"

          NEW_CONTENT="server = \"http://${REGISTRY}\"

          [host.\"http://${REGISTRY}\"]
            capabilities = [\"pull\", \"resolve\", \"push\"]
            skip_verify = true"

          if [ "$(cat ${HOSTS_TOML} 2>/dev/null)" = "${NEW_CONTENT}" ]; then
            echo "Registry already configured on $(hostname), skipping restart"
            exit 0
          fi

          echo "${NEW_CONTENT}" > "${HOSTS_TOML}"
          echo "Wrote ${HOSTS_TOML} on $(hostname)"
          nsenter -t 1 -m -u -i -n -- systemctl restart containerd
          echo "Restarted containerd on $(hostname)"
        volumeMounts:
        - name: containerd-certs
          mountPath: /host-certs
      containers:
      - name: pause
        image: busybox:1.36
        command: ["sh", "-c", "echo Node $(hostname) configured; sleep infinity"]
      volumes:
      - name: containerd-certs
        hostPath:
          path: /etc/containerd/certs.d
          type: DirectoryOrCreate
