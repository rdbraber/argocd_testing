apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-node-config
  namespace: registry
spec:
  selector:
    matchLabels:
      app: registry-node-config
  template:
    metadata:
      labels:
        app: registry-node-config
    spec:
      hostPID: true
      tolerations:
      - operator: Exists
      initContainers:
      - name: configure-containerd
        image: busybox:1.36
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - |
          REGISTRY="192.168.123.248:5000"
          CERT_DIR="/host-certs/${REGISTRY}"
          HOSTS_TOML="${CERT_DIR}/hosts.toml"
          CONFIG_TOML="/host-config/config.toml"

          # Fix config_path — containerd 2.x treats the value as a single string,
          # so the colon-separated value '/etc/containerd/certs.d:/etc/docker/certs.d'
          # resolves to a non-existent directory. Set it to a single valid path.
          sed -i "s|config_path = '/etc/containerd/certs.d:/etc/docker/certs.d'|config_path = '/etc/containerd/certs.d'|g" "${CONFIG_TOML}"

          # Write the per-registry hosts.toml
          mkdir -p "${CERT_DIR}"
          cat > "${HOSTS_TOML}" << EOF
          server = "http://${REGISTRY}"

          [host."http://${REGISTRY}"]
            capabilities = ["pull", "resolve", "push"]
            skip_verify = true
          EOF

          echo "Configured registry on $(hostname), restarting containerd..."
          nsenter -t 1 -m -u -i -n -- systemctl restart containerd
          sleep 5
          echo "Done on $(hostname)"
        volumeMounts:
        - name: containerd-certs
          mountPath: /host-certs
        - name: containerd-config
          mountPath: /host-config
      containers:
      - name: pause
        image: busybox:1.36
        command: ["sh", "-c", "echo Node $(hostname) configured; sleep infinity"]
      volumes:
      - name: containerd-certs
        hostPath:
          path: /etc/containerd/certs.d
          type: DirectoryOrCreate
      - name: containerd-config
        hostPath:
          path: /etc/containerd
          type: Directory
