apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volunteer-scheduler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rdbraber/argocd_testing.git
    targetRevision: main
    path: sample_app/k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: volunteer-scheduler
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
